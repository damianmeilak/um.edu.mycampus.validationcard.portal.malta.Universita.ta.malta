<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Campus – UM Student Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:     #2563EB;
      --text:     #111111;
      --muted:    #555555;
      --border:   #e2e2e2;
      --white:    #ffffff;
      --title-bg: #333333;
      --nav-h:    70px;
    }
    html, body {
      height: 100%;
      height: 100dvh;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100dvh;
      overflow: hidden;
    }
    .app-shell {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 48px rgba(0,0,0,.2);
      overflow: hidden;
      position: relative;
    }
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .hdr-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); display: flex; align-items: center; padding: 4px;
    }
    .hdr-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hdr-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .subtitle-bar {
      background: var(--title-bg);
      color: var(--white);
      padding: 15px 20px;
      font-size: 1.12rem;
      font-weight: 700;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 36px 24px calc(var(--nav-h) + 20px);
      display: flex;
      flex-direction: column;
      gap: 30px;
      -webkit-overflow-scrolling: touch;
    }
    .logo-row { display: flex; justify-content: center; padding: 10px 0; }
    .logo-row img { height: 72px; object-fit: contain; }
    .clock-strip {
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .clock-svg { width: 36px; height: 36px; flex-shrink: 0; }
    #live-time { font-size: .95rem; font-weight: 600; color: var(--text); }
    .info-table { display: grid; grid-template-columns: auto 1fr; gap: 16px 28px; }
    .lbl { font-size: .9rem; font-weight: 700; color: var(--text); white-space: nowrap; }
    .val { font-size: .9rem; font-weight: 400; color: var(--text); }
    .val.soft { color: var(--muted); }
    .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #qr-container { cursor: zoom-in; display: inline-block; }
    #qr-container img, #qr-container canvas { display: block; }
    .tap-label { font-size: .88rem; color: var(--text); }
    nav {
      position: sticky;
      bottom: 0;
      width: 100%;
      height: var(--nav-h);
      min-height: var(--nav-h);
      flex-shrink: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 80px;
      z-index: 20;
    }
    nav a {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; text-decoration: none; color: var(--text);
      font-size: .62rem; font-weight: 600; letter-spacing: .02em;
    }
    nav a svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    nav a svg.home-svg { fill: none; stroke: none; }
    .icon-home { fill: var(--text) !important; stroke: none !important; }
    .icon-door { fill: var(--white) !important; stroke: none !important; }
    nav a.active { color: var(--blue); }
    nav a.active .icon-home { fill: var(--blue) !important; }
    nav a.active .icon-door { fill: var(--white) !important; }
    .bell-wrap { position: relative; display: inline-flex; }
    .badge { position: absolute; top: -2px; right: -4px; width: 9px; height: 9px; background: #EF4444; border-radius: 50%; }
    #zoom-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 100;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    #zoom-overlay.show { display: flex; }
    .zoom-inner {
      background: var(--white); border-radius: 0; padding: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,.3); animation: pop .2s ease;
    }
    @keyframes pop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }

    /* Validity screen */
    #validity-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 24px calc(var(--nav-h) + 40px);
      gap: 32px;
      background: var(--white);
      -webkit-overflow-scrolling: touch;
    }
    #validity-screen.show { display: flex; }
    .validity-check {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .validity-check svg {
      width: 90px; height: 90px;
      stroke: #666; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .validity-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      text-align: center;
    }
    .validity-card {
      width: 100%;
      background: #f2f2f2;
      border-radius: 16px;
      padding: 20px 20px 22px;
    }
    .validity-card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .validity-card-logo img {
      height: 48px;
      object-fit: contain;
    }
    .validity-info {
      font-size: .93rem;
      color: #222;
      line-height: 1.9;
    }
    @media (min-width: 480px) {
      body { background: #b8b8b8; align-items: flex-start; }
      .app-shell { border-radius: 0; }
      header { position: sticky; }
    }
  </style>
</head>

<script>
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SMON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
  function pad(n){return String(n).padStart(2,'0');}
  function formatDisplay(d){return `${DAYS[d.getDay()]} ${ordinal(d.getDate())} ${MONTHS[d.getMonth()]} ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
  function formatValidUntil(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())} CEST`;}
  function tick(){document.getElementById('live-time').textContent=formatDisplay(new Date());}
  tick(); setInterval(tick,1000);
  const entry=new Date();
  const validUntil=new Date(entry.getTime()+2*3600*1000);
  document.getElementById('valid-until').textContent=formatValidUntil(validUntil);
  function openZoom(){document.getElementById('zoom-overlay').classList.add('show');}
  function closeZoom(){document.getElementById('zoom-overlay').classList.remove('show');}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});

  // Validated on date
  const now = new Date();
  document.getElementById('validated-on').textContent =
    `Validated on: ${now.getDate()}/${MONTHS[now.getMonth()]}/${now.getFullYear()}`;

  // Screen switching
  function showScreen(screen) {
    const contentEl = document.querySelector('.content');
    const validity  = document.getElementById('validity-screen');
    const navMC     = document.getElementById('nav-mycampus');
    const navV      = document.getElementById('nav-validity');
    const subtitle  = document.getElementById('subtitle-bar');
    const hdrTitle  = document.querySelector('.hdr-title');
    if (screen === 'validity') {
      contentEl.style.display = 'none';
      validity.style.display  = 'flex';
      navMC.classList.remove('active');
      navV.classList.add('active');
      subtitle.textContent = 'Validity';
      hdrTitle.textContent = 'Validity';
    } else {
      contentEl.style.display = '';
      validity.style.display  = 'none';
      navV.classList.remove('active');
      navMC.classList.add('active');
      subtitle.textContent = 'My UM Student Card';
      hdrTitle.textContent = 'Student Card';
    }
  }
</script>
