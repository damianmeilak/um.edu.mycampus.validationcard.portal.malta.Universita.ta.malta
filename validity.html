<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Validity – UM Student Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:     #2563EB;
      --text:     #111111;
      --muted:    #555555;
      --border:   #e2e2e2;
      --white:    #ffffff;
      --title-bg: #333333;
      --nav-h:    70px;
    }
    html, body {
      height: 100%;
      height: 100dvh;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100dvh;
      overflow: hidden;
    }
    .app-shell {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 48px rgba(0,0,0,.2);
      overflow: hidden;
      position: relative;
    }
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
      flex-shrink: 0;
    }
    .hdr-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); display: flex; align-items: center; padding: 4px;
    }
    .hdr-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hdr-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .subtitle-bar {
      background: var(--title-bg);
      color: var(--white);
      padding: 15px 20px;
      font-size: 1.12rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .validity-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 24px calc(var(--nav-h) + 40px);
      gap: 32px;
      background: var(--white);
      -webkit-overflow-scrolling: touch;
    }
    .validity-check {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .validity-check svg {
      width: 90px; height: 90px;
      stroke: #666; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .validity-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      text-align: center;
    }
    .validity-card {
      width: 100%;
      background: #f2f2f2;
      border-radius: 16px;
      padding: 20px 20px 22px;
    }
    .validity-card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .validity-card-logo img {
      height: 48px;
      object-fit: contain;
    }
    .validity-info {
      font-size: .93rem;
      color: #222;
      line-height: 1.9;
    }
    nav {
      position: sticky;
      bottom: 0;
      width: 100%;
      height: var(--nav-h);
      min-height: var(--nav-h);
      flex-shrink: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 80px;
      z-index: 20;
    }
    nav a {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; text-decoration: none; color: var(--text);
      font-size: .62rem; font-weight: 600; letter-spacing: .02em;
    }
    nav a svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    nav a svg.home-svg { fill: none; stroke: none; }
    .icon-home { fill: var(--text) !important; stroke: none !important; }
    .icon-door { fill: var(--white) !important; stroke: none !important; }
    nav a.active { color: var(--blue); }
    nav a.active .icon-home { fill: var(--blue) !important; }
    nav a.active .icon-door { fill: var(--white) !important; }
    @media (min-width: 480px) {
      body { background: #b8b8b8; align-items: flex-start; }
      .app-shell { border-radius: 0; }
    }
  </style>
</head>
